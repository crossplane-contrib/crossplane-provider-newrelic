version: "2"

run:
  timeout: 10m

output:
  formats:
    text:
      path: stdout
      colors: true

linters:
  default: none
  enable:
    - staticcheck
    - govet
    - gocyclo
    - gocritic
    - goconst
    - prealloc
    - revive
    - unconvert
    - misspell
    - nakedret
    - unused
    - errcheck
    - gosec
    - dupl

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false

    govet:
      enable:
        - shadow

    gocyclo:
      min-complexity: 10

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 5

    lll:
      tab-width: 1

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 32

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
    rules:
      # Exclude some linters from running on tests files.
      - path: _test(ing)?\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - unparam

      # Ease some gocritic warnings on test files.
      - path: _test\.go
        text: "(unnamedResult|exitAfterDefer)"
        linters:
          - gocritic

      # These are performance optimisations rather than style issues per se.
      # They warn when function arguments or range values copy a lot of memory
      # rather than using a pointer.
      - text: "(hugeParam|rangeValCopy):"
        linters:
          - gocritic

      # Ignore hugeParam warnings for controller options parameter 'o'
      - text: "hugeParam: o is heavy"
        linters:
          - gocritic

      # This "TestMain should call os.Exit to set exit code" warning is not clever
      # enough to notice that we call a helper method that calls os.Exit.
      - text: "SA3000:"
        linters:
          - staticcheck

      # This is a "potential hardcoded credentials" warning. It's triggered by
      # any variable with 'secret' in the same, and thus hits a lot of false
      # positives in Kubernetes land where a Secret is an object type.
      - text: "G101:"
        linters:
          - gosec

      # This is an 'errors unhandled' warning that duplicates errcheck.
      - text: "G104:"
        linters:
          - gosec

      # Exclude generated files
      - path: "zz_.*\\.go$"
        linters:
          - all

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/crossplane-contrib/crossplane-provider-newrelic

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
